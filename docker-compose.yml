services:
  backup:
    build: .
    container_name: backup_service
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /home/sameer:/source:ro
      - /home/sameer/backups:/backups
      - ./:/app:ro
    environment:
      - SCHEDULE=0 3 * * *
      - RETENTION_DAYS=7
      - RETENTION_WEEKS=4
      - TZ=Asia/Tokyo
    networks:
      - caddy

  dev:
    build: .
    container_name: backup_service_dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /home/sameer:/source:ro
      - /home/sameer/backups:/backups
      - ./:/app
    environment:
      - TZ=Asia/Tokyo
    networks:
      - caddy
    entrypoint: ["sleep", "infinity"]

networks:
  caddy:
    external: true

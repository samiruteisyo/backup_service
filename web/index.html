<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backup Service</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}
header {
  background: #1e293b;
  border-bottom: 1px solid #334155;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 { font-size: 1.125rem; color: #f1f5f9; }
.header-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #1e40af; cursor: not-allowed; }
.btn-danger { background: #334155; color: #f87171; }
.btn-danger:hover { background: #475569; }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }

.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 20px;
}
.stat-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card .value { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; margin-top: 4px; }

.projects { display: flex; flex-direction: column; gap: 16px; }
.project-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  overflow: hidden;
}
.project-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.project-header:hover { background: #334155; }
.project-name {
  font-size: 1rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.project-meta {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 0.8rem;
  color: #94a3b8;
}
.project-meta .badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 500;
}
.badge-db { background: #7c3aed20; color: #a78bfa; }
.badge-files { background: #05966920; color: #34d399; }
.chevron {
  font-size: 0.8rem;
  color: #94a3b8;
  transition: transform 0.2s;
}
.chevron.open { transform: rotate(180deg); }

.project-body {
  display: none;
  border-top: 1px solid #334155;
}
.project-body.open { display: block; }

.backups-table {
  width: 100%;
  border-collapse: collapse;
}
.backups-table th {
  padding: 10px 20px;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #64748b;
  border-bottom: 1px solid #334155;
}
.backups-table td {
  padding: 10px 20px;
  font-size: 0.8rem;
  border-bottom: 1px solid #1e293b;
}
.backups-table tr:hover td { background: #1e293b; }
.type-icon {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.type-dot.db { background: #a78bfa; }
.type-dot.files { background: #34d399; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #64748b;
}
.empty-state .icon { font-size: 2rem; margin-bottom: 12px; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 0.85rem;
  z-index: 100;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: #059669; }
.toast.error { border-color: #dc2626; }

.loading {
  text-align: center;
  padding: 60px;
  color: #64748b;
}

@media (max-width: 640px) {
  .container { padding: 16px; }
  .project-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .project-meta { flex-wrap: wrap; }
  .backups-table th, .backups-table td { padding: 8px 12px; font-size: 0.75rem; }
}
</style>
</head>
<body>
<header>
  <h1>Backup Service</h1>
  <div class="header-actions">
    <button class="btn btn-primary" id="triggerBtn" onclick="triggerBackup()">Run Backup Now</button>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="projects" id="projects">
    <div class="loading">Loading backups...</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let allProjects = [];

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  if (days < 7) return days + 'd ago';

  return d.toLocaleDateString('en-US', {
    month: 'short',
    day: 'numeric',
    year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined,
  });
}

function formatFullDate(iso) {
  return new Date(iso).toLocaleString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function toggleProject(name) {
  const body = document.getElementById('body-' + name);
  const chevron = document.getElementById('chevron-' + name);
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

function renderStats() {
  const totalProjects = allProjects.length;
  const totalBackups = allProjects.reduce((s, p) => s + p.files.length, 0);
  const totalSize = allProjects.reduce((s, p) => s + p.totalSize, 0);
  const projectsWithDb = allProjects.filter(p => p.files.some(f => f.type === 'database')).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Projects</div>
      <div class="value">${totalProjects}</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Backups</div>
      <div class="value">${totalBackups}</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Size</div>
      <div class="value">${formatBytes(totalSize)}</div>
    </div>
    <div class="stat-card">
      <div class="label">With Database</div>
      <div class="value">${projectsWithDb}</div>
    </div>
  `;
}

function renderProjects() {
  const container = document.getElementById('projects');

  if (allProjects.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#128193;</div>
        <p>No backups found yet.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = allProjects.map(project => {
    const hasDb = project.files.some(f => f.type === 'database');
    const hasFiles = project.files.some(f => f.type === 'files');

    return `
      <div class="project-card">
        <div class="project-header" onclick="toggleProject('${project.name}')">
          <div class="project-name">
            ${project.name}
            ${hasDb ? '<span class="badge badge-db">DB</span>' : ''}
            ${hasFiles ? '<span class="badge badge-files">Files</span>' : ''}
          </div>
          <div class="project-meta">
            <span>${project.files.length} backup${project.files.length !== 1 ? 's' : ''}</span>
            <span>${formatBytes(project.totalSize)}</span>
            ${project.lastBackup ? '<span>Last: ' + formatDate(project.lastBackup) + '</span>' : ''}
            <span class="chevron" id="chevron-${project.name}">&#9660;</span>
          </div>
        </div>
        <div class="project-body" id="body-${project.name}">
          <table class="backups-table">
            <thead>
              <tr>
                <th>Type</th>
                <th>File</th>
                <th>Size</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${project.files.map(file => `
                <tr>
                  <td>
                    <span class="type-icon">
                      <span class="type-dot ${file.type}"></span>
                      ${file.type === 'database' ? 'Database' : 'Files'}
                    </span>
                  </td>
                  <td title="${file.name}">${file.name}</td>
                  <td>${formatBytes(file.size)}</td>
                  <td title="${formatFullDate(file.mtime)}">${formatDate(file.mtime)}</td>
                  <td>
                    <a class="btn btn-primary btn-sm" href="/api/download/${project.name}/${file.name}">Download</a>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');
}

async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    if (res.status === 401) {
      window.location.href = '/login';
      return;
    }
    allProjects = await res.json();
    renderStats();
    renderProjects();
  } catch (err) {
    document.getElementById('projects').innerHTML = `
      <div class="empty-state">
        <p>Failed to load backups.</p>
      </div>
    `;
  }
}

async function triggerBackup() {
  const btn = document.getElementById('triggerBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  try {
    const res = await fetch('/api/trigger', { method: 'POST' });
    if (res.ok) {
      showToast('Backup completed successfully');
      setTimeout(loadProjects, 1000);
    } else {
      const data = await res.json();
      showToast(data.error || 'Backup failed', 'error');
    }
  } catch {
    showToast('Network error', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Backup Now';
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

loadProjects();
</script>
</body>
</html>
